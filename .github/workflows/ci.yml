name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tsc and the test suite both transitively import the generated Prisma
      # client (src/generated/prisma is gitignored, only produced by this
      # step) — must run before lint/typecheck/test, not just before build.
      - run: pnpm exec prisma generate

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm test

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET: ci-placeholder-secret-not-for-production-use
          RESEND_API_KEY: ci-placeholder-key
          GEMINI_API_KEY: ci-placeholder-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
